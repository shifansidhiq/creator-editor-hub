{% extends 'myapp/base.html' %}
{% load static %}
{% block title %}Creator Login - CreatorHub{% endblock %}
{% block body %}
<div class="min-h-screen bg-gradient-to-br from-emerald-50 via-white to-teal-100 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-emerald-500 to-teal-700 rounded-2xl shadow-lg mb-4">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
                </svg>
            </div>
            <h2 class="text-3xl font-bold font-heading text-gray-900">Creator Portal</h2>
            <p class="mt-2 text-sm text-gray-600">Sign in to manage your portfolio</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8">
            {% if msg %}
            <div class="mb-6 p-4 bg-red-50 border border-red-200 text-red-700 rounded-xl text-sm">
                {{ msg }}
            </div>
            {% endif %}
            
            <form method="post" action="{% url 'creator_login' %}" class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label for="uname" class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                    <input type="text" id="uname" name="uname" required 
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all outline-none"
                           placeholder="Enter your username">
                </div>

                <div>
                    <label for="passwd" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <input type="password" id="passwd" name="passwd" required 
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all outline-none"
                           placeholder="Enter your password">
                </div>

                <button type="submit" name="bt" 
                        class="w-full py-3 px-4 bg-gradient-to-r from-emerald-600 to-teal-700 hover:from-emerald-700 hover:to-teal-800 text-white font-semibold rounded-xl shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-0.5">
                    Sign In as Creator
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-sm text-gray-600">
                    New creator? 
                    <a href="{% url 'creator_details_add' %}" class="font-semibold text-emerald-600 hover:text-emerald-700">Create Portfolio Account</a>
                </p>
            </div>
        </div>

        <div class="mt-8 text-center">
            <a href="{% url 'index' %}" class="text-sm text-gray-600 hover:text-gray-900 flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Back to Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
