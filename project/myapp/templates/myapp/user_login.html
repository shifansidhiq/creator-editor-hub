{% extends 'myapp/base.html' %}
{% load static %}
{% block title %}User Login - CreatorHub{% endblock %}
{% block body %}
<div class="min-h-screen bg-gradient-to-br from-primary-50 via-white to-primary-100 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-primary-500 to-primary-700 rounded-2xl shadow-lg mb-4">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
            </div>
            <h2 class="text-3xl font-bold font-heading text-gray-900">Welcome Back</h2>
            <p class="mt-2 text-sm text-gray-600">Sign in to your user account</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white rounded-2xl shadow-xl p-8">
            {% if msg %}
            <div class="mb-6 p-4 bg-red-50 border border-red-200 text-red-700 rounded-xl text-sm">
                {{ msg }}
            </div>
            {% endif %}
            
            <form method="post" action="{% url 'user_login' %}" class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label for="uname" class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                    <input type="text" id="uname" name="uname" required 
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all outline-none"
                           placeholder="Enter your username">
                </div>

                <div>
                    <label for="passwd" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <input type="password" id="passwd" name="passwd" required 
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all outline-none"
                           placeholder="Enter your password">
                </div>

                <button type="submit" name="bt" 
                        class="w-full py-3 px-4 bg-gradient-to-r from-primary-600 to-primary-700 hover:from-primary-700 hover:to-primary-800 text-white font-semibold rounded-xl shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-0.5">
                    Sign In
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-sm text-gray-600">
                    Don't have an account? 
                    <a href="{% url 'user_details_add' %}" class="font-semibold text-primary-600 hover:text-primary-700">Create Account</a>
                </p>
            </div>
        </div>

        <!-- Back Link -->
        <div class="mt-8 text-center">
            <a href="{% url 'index' %}" class="text-sm text-gray-600 hover:text-gray-900 flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Back to Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
