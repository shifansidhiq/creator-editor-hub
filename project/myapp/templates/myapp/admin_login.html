{% extends 'myapp/base.html' %}
{% load static %}
{% block title %}Admin Login - CreatorHub{% endblock %}
{% block body %}
<div class="min-h-screen bg-gradient-to-br from-gray-900 via-gray-800 to-primary-900 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-red-500 to-red-700 rounded-2xl shadow-lg mb-4">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
            </div>
            <h2 class="text-3xl font-bold font-heading text-white">Admin Portal</h2>
            <p class="mt-2 text-sm text-gray-400">Secure administrative access</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8">
            {% autoescape off %}{{ msg1 }}{% endautoescape %}
            
            <form method="post" action="{% url 'admin_login' %}" class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label for="un" class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                    <input type="text" id="un" name="un" required 
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-red-500 focus:border-transparent transition-all outline-none"
                           placeholder="Enter admin username">
                </div>

                <div>
                    <label for="pwd" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <input type="password" id="pwd" name="pwd" required 
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-red-500 focus:border-transparent transition-all outline-none"
                           placeholder="Enter admin password">
                </div>

                <button type="submit" name="bt" 
                        class="w-full py-3 px-4 bg-gradient-to-r from-red-600 to-red-700 hover:from-red-700 hover:to-red-800 text-white font-semibold rounded-xl shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-0.5">
                    Sign In as Admin
                </button>
            </form>
        </div>

        <div class="mt-8 text-center">
            <a href="{% url 'index' %}" class="text-sm text-gray-400 hover:text-white flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Back to Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
