{% extends 'myapp/base.html' %}
{% load static %}
{% block title %}Create Account - CreatorHub{% endblock %}
{% block body %}
<div class="min-h-screen bg-gradient-to-br from-primary-50 via-white to-primary-100 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-lg mx-auto">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold font-heading text-gray-900">Create Your Account</h2>
            <p class="mt-2 text-sm text-gray-600">Join CreatorHub and discover amazing creators</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8">
            {% if msg %}
            <div class="mb-6 p-4 bg-green-50 border border-green-200 text-green-700 rounded-xl text-sm">
                {{ msg }}
            </div>
            {% endif %}

            <form method="post" action="{% url 'user_details_add' %}" class="space-y-5">
                {% csrf_token %}
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="fname" class="block text-sm font-medium text-gray-700 mb-2">First Name</label>
                        <input type="text" id="fname" name="fname" required 
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none"
                               placeholder="John">
                    </div>
                    <div>
                        <label for="lname" class="block text-sm font-medium text-gray-700 mb-2">Last Name</label>
                        <input type="text" id="lname" name="lname" required 
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none"
                               placeholder="Doe">
                    </div>
                </div>

                <div>
                    <label for="contact" class="block text-sm font-medium text-gray-700 mb-2">Phone Number</label>
                    <input type="tel" id="contact" name="contact" 
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none"
                           placeholder="+1 (555) 000-0000">
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                    <input type="email" id="email" name="email" required 
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none"
                           placeholder="you@example.com">
                </div>

                <div>
                    <label for="pwd" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <input type="password" id="pwd" name="pwd" required 
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none"
                           placeholder="••••••••">
                </div>

                <button type="submit" name="bt" 
                        class="w-full py-3 px-4 bg-gradient-to-r from-primary-600 to-primary-700 hover:from-primary-700 hover:to-primary-800 text-white font-semibold rounded-xl shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-0.5">
                    Create Account
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-sm text-gray-600">
                    Already have an account? 
                    <a href="{% url 'user_login' %}" class="font-semibold text-primary-600 hover:text-primary-700">Sign In</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
